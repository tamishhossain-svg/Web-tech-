<!DOCTYPE html>
<html>
<head>
    <title>Student Information System</title>
</head>
<body>

<div class="container">
    <h2>Student Information System</h2>

    <button onclick="loadStudents()">Load Student Data</button>

    <div id="result" class="result-box">
        <p>No data loaded</p>
    </div>
</div>

<script>
function loadStudents() {
    var xhr = new XMLHttpRequest();

    xhr.open("GET", "student.php", true);

    xhr.onload = function () {
        if (xhr.status === 200) {
            var students = JSON.parse(xhr.responseText);

            var output = "";

            students.forEach(function(student) {
                output += `
                    <div class="student-card">
                        <h3>${student.name}</h3>
                        <p><strong>ID:</strong> ${student.id}</p>
                        <p><strong>Department:</strong> ${student.department}</p>
                        <p><strong>CGPA:</strong> ${student.cgpa}</p>
                    </div>
                `;
            });

            document.getElementById("result").innerHTML = output;
        } else {
            document.getElementById("result").innerHTML = "Error loading data";
        }
    };

    xhr.onerror = function () {
        document.getElementById("result").innerHTML = "Request failed (Check server)";
    };

    xhr.send();
}
</script>
</body>
</html>
